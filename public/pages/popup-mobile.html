<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popup</title>
  <style>
    .pop-mob-body{
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin: auto;
      width: 100%;
      padding: 6.25rem;
      background-image: url("../bg-images/bear.webp");
      background-size: 2.5rem 2.5rem;
      background-repeat: repeat;
    }
    .pop-mob-body a{
      display: inline-block;
      position: relative;
      border: none;
      cursor: pointer;

      margin: 1.5rem;
    }

    .pop-mob-body .front{
      display: flex;
      font-family: 'Comfortaa';
      letter-spacing: 10%;
      position: relative;
      border: solid 1px #790C25;
      border-radius: 0.625rem;
      color: #37000C;
      background-color: #FFDAD3;
      /* transform: translateY(-1rem); */
      transition: 450ms ease-out;
      padding: 0.656rem;
      transform: translateY(-0.25rem);
    }

    .pop-mob-body .edge{
      display: flex;
      position: absolute;
      border-radius: 0.625rem;
      background-color: #741a2eff;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    .pop-mob-body a:hover .front{
      color: #DE6D85;
      background-color: #FFFFFF;
    }
    .pop-mob-body a:active .front{
      transform: translateY(0);
      transition: 450ms ease-out;
      transition: transform 10ms;
    }
   
    .pop-mob-body img{
      width: 600px;
      height: auto;
      border: 1px solid black;
      box-shadow: 0 5px 7px #9a5d2880;
    } 

    @media screen and (max-width: 1050px){
      .pop-mob-body{
        height: auto;
        padding: 1.875rem;
      }
      .pop-mob-body img{
        width: 37.5rem;
        height: auto;
        border: 1px solid black;
        box-shadow: 0 5px 7px #9a5d2880;
        padding: 0;
        margin: 0;
      }
    }
  </style>
</head>
<body class="pop-mob-body">
  <img id="popup-img" style="max-width:100%;" alt="name">
  <a onclick="window.history.back()"> 
    <span class="edge"></span>
    <span class="front"> < Back </span>
  </a>
  <script>
    const params = new URLSearchParams(window.location.search);
    const imgSrc = params.get("img");
    const img = document.getElementById("popup-img");

    if (imgSrc && img) {
      console.log(imgSrc);
      img.src = imgSrc;
    }
  </script>
</body>
</html>
