<html>
<head>
  <title>Popup</title>
</head>
<body>
  <img id="popup-img" style="max-width:100%;">

  <script>
    const params = new URLSearchParams(window.location.search);
    const imgSrc = params.get("img");
    const img = document.getElementById("popup-img");

    if (imgSrc && img) {
      img.setAttribute("src", imgSrc);
    }
  </script>
</body>
</html>
