<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026</title>
    <script>
      darkmode = localStorage.getItem("darkmode");
      if(darkmode === "1"){
        document.documentElement.style.setProperty("--bg", "#0b0110");
        document.documentElement.style.setProperty("--gallery-lace", "invert(100%)");
      }
      else {
        document.documentElement.style.setProperty("--bg", "#F1FFB8");
        document.documentElement.style.setProperty("--gallery-text1-color", "#69b069");
      }
    </script>
    <link href="/style.css" rel="stylesheet" type="text/css" media="all">
    <script src="/js/darkmode-other.js" defer></script>
    <link rel="icon" type="image/x-icon" href="/images/favicons/gallery-pencil.ico">
  </head>
  <body>
    <main class="gallery-wrapper">
      <div class="gallery-container">
        <div class="leftside" id="C1">        
          <div class="title"> 
            <h1> GALLERY </h1>
          </div>
          
          <div class="content">
            <div class="years">
              <div class="year-box"> Year </div>
              <a id="2026" href="/pages/gallery-pages/2026.html">

                <span class="front">2026</span>
              </a>
              <a id="2025" href="/pages/gallery-pages/2025.html">

              </a>
            </div>
            <div class="rest-gallery">

          <script src="/js/createImagesDescending.js"></script>
          <script> CreateDescendingImages("#gallery", 56, 52, "img", "/images/gallery-images/2026/", "webp"); </script>
          <div class="goup"> 
              <a href="#C1">

</html>
