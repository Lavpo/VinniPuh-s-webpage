<!DOCTYPE html>
<html>
<head>
  <title>Popup</title>
  <style>
    body{
      display: flex;
      justify-content: center;
      align-items: center;
      /* margin: auto; */
      width: 100%;
      height: 100vh;
      padding: 0;
      margin: 0;
      background-image: url("../bg-images/bear.webp");
      background-size: 2.5rem 2.5rem;
      background-repeat: repeat;
    }
    img{
      width: 250px;
      height: auto;
      border: 1px solid black;
      box-shadow: 0 5px 7px #9a5d2880;
    }
  </style>
</head>
<body>
  <img id="popup-img" style="max-width:100%;" alt="name">
  <script>
    const params = new URLSearchParams(window.location.search);
    const imgSrc = params.get("img");
    const img = document.getElementById("popup-img");

    if (imgSrc && img) {
      console.log(imgSrc);
      img.src = imgSrc;
    }
  </script>
</body>
</html>
